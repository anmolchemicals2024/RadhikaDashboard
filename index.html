<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extension Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#153b8f;
    --secondary:#1e40af;
    --bg:#f4f7fb;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef4ff,#f8fbff);
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    background:linear-gradient(135deg,#024175,#375dda);
    color:#fff;
    padding:30px;
    border-radius:20px;
    text-align:center;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.header h1{
    font-size:32px;
}

.header p{
    opacity:.9;
    margin-top:8px;
}

.search{
    margin-bottom:20px;
}

.search input{
    width:100%;
    padding:15px 20px;
    border:none;
    border-radius:15px;
    font-size:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card{
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#005295;
    color:white;
}

th{
    padding:16px;
    text-align:left;
    position:sticky;
    top:0;
}

td{
    padding:14px 16px;
    border-bottom:1px solid #edf2f7;
}

tbody tr:nth-child(even){
    background:#f8fafc;
}

tbody tr:hover{
    background:#eaf2ff;
}

.ext{
    font-weight:600;
    color:#005295;
}

.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:50px;
    font-size:12px;
    font-weight:600;
    background:#dbeafe;
    color:#1d4ed8;
}

.footer{
    text-align:center;
    font-size:13px;
    margin-top:15px;
    color:#666;
}

.stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0 20px;
  font-weight: 600;
  color: #1e40af;
}

.tel {
  font-weight: 600;
}



@media(max-width:768px){
    table{
        font-size:13px;
    }

    th,td{
        padding:10px;
    }

    .header h1{
        font-size:24px;
    }
}
</style>
</head>
<body>

<div class="header">
    <h1>Anmol Chemical Pvt. Ltd</h1>
    <p>&#9742;   &nbsp; Company Extension Directory</p>
</div>

    <input type="text"

  <div class="tel">

</div>

<div class="footer">

const tableBody = document.getElementById("tableBody");

function renderTable(rows){
    tableBody.innerHTML = rows.map(row => `
        <tr>
            <td>${row[0]}</td>
            <td>${row[1]}</td>
            <td class="ext">${row[2]}</td>
            <td><span>${row[3]}</span></td>
        </tr>
    `).join('');

    document.getElementById("count").textContent = rows.length;
}

document.getElementById("searchInput").addEventListener("keyup", function(){

        row.join(" ").toLowerCase().includes(value)
